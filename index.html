                    #journal-trade-app {

                        --journal-bg-input: #2f3633;

                        --journal-bg-hover: #475569;
                        --journal-bg-today: #403a45;

                        --journal-accent-color: #6f86a6;

                        --journal-primary-color: #4a6fa5;

                    }

                    #journal-trade-app h1 {

                        margin-top: 0;
                        color: var(--journal-text-main);

                    #journal-trade-app .container {
                        max-width: 1200px;
                        margin: 0 auto;
                    }

                    #journal-trade-app .top-bar {
                        display: flex;
                        justify-content: space-between;
                        align-items: flex-end;
                        margin-bottom: 20px;
                        gap: 16px;
                        flex-wrap: wrap;

                    #journal-trade-app .top-left-block {
                        flex: 1;
                        min-width: 300px;
                    }

                    #journal-trade-app .month-control {
                        text-align: right;

                        border-radius: 4px;

                        background-color: var(--journal-bg-input);
                        color: var(--journal-text-main);
                        cursor: pointer;
                        transition: all 0.2s ease;
                        display: inline-flex;
                        align-items: center;
                        gap: 4px;
                        text-decoration: none;
                        font-family: inherit;
                    }

                    #journal-trade-app .btn:hover {
                        background-color: var(--journal-bg-hover);
                        border-color: var(--journal-accent-color);
                    }

                    #journal-trade-app .btn-danger {

                    }

                    #journal-trade-app .btn-danger:hover {

                        border-color: #c26f6f;
                    }

                    #journal-trade-app .btn-primary {
                        border-color: var(--journal-primary-color);
                        background-color: #2e3b4e;
                    }

                    #journal-trade-app .btn-primary:hover {
                        background-color: #3b4d66;
                    }

                    #journal-trade-app .hint-text {
                        font-size: 11px;
                        color: var(--journal-text-muted);
                        margin-left: 8px;
                        display: inline-block;
                    }

                    #journal-trade-app .calendar-wrapper {
                        background-color: var(--journal-bg-panel);
                        border-radius: 8px;
                        padding: 16px;
                        border: 1px solid var(--journal-border-color);
                        margin-bottom: 40px;
                    }

                    #journal-trade-app .week-header {
                        display: grid;
                        grid-template-columns: repeat(7, 1fr);
                        gap: 8px;
                        margin-bottom: 8px;
                    }

                    #journal-trade-app .week-day-name {
                        text-align: center;
                        font-size: 14px;
                        font-weight: bold;
                        color: var(--journal-text-muted);
                        padding: 8px 0;
                    }

                    #journal-trade-app .week-day-name.weekend {
                        color: var(--journal-text-weekend);
                    }

                    #journal-trade-app .calendar-grid {
                        display: grid;
                        grid-template-columns: repeat(7, 1fr);
                        gap: 1px;
                        background-color: var(--journal-border-color);
                        border: 1px solid var(--journal-border-color);
                    }

                    #journal-trade-app .day-cell {
                        background-color: var(--journal-bg-panel);
                        min-height: 120px;
                        padding: 8px;
                        position: relative;
                        cursor: pointer;
                        display: flex;
                        flex-direction: column;
                        gap: 6px;
                        transition: background-color 0.2s;
                    }

                    #journal-trade-app .day-cell:hover {
                        background-color: var(--journal-bg-hover);
                    }

                    #journal-trade-app .day-number {
                        font-family: monospace;
                        font-size: 14px;
                        color: #cac6ba;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    }

                    #journal-trade-app .day-cell.is-weekend .day-number {
                        color: var(--journal-text-weekend);
                    }

                    #journal-trade-app .day-cell.is-today {
                        background-color: var(--journal-bg-today);
                    }

                    #journal-trade-app .day-cell.is-today .day-number {
                        color: #fff;
                        font-weight: bold;
                    }

                    #journal-trade-app .day-cell.is-today::after {
                        content: "";
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 4px;
                        height: 100%;
                        background-color: var(--journal-highlight-border);
                    }

                    #journal-trade-app .day-cell.other-month {
                        opacity: 0.3;
                        pointer-events: none;
                        background-color: var(--journal-bg-input);
                    }

                    #journal-trade-app .more-indicator {
                        position: absolute;
                        top: 0;
                        right: 0;
                        width: 0;
                        height: 0;
                        border-style: solid;
                        border-width: 0 12px 12px 0;
                        border-color: transparent var(--journal-danger-color) transparent transparent;
                        background-color: transparent;
                        border-radius: 0;
                        display: none;
                        z-index: 5;
                        pointer-events: none;
                    }

                    #journal-trade-app .day-cell.is-overflowing .more-indicator {
                        display: block;
                    }

                    #journal-trade-app .day-cell:hover .more-indicator {
                        background-color: var(--journal-highlight-border);
                        transform: scale(1.2);
                    }

                    #journal-trade-app .note-preview {
                        font-size: 14px;
                        color: var(--journal-text-muted);
                        line-height: 1.4;
                        flex: 1;
                        overflow: hidden;
                        word-break: break-all;
                        white-space: pre-wrap;
                        display: -webkit-box;
                        -webkit-line-clamp: 4;
                        line-clamp: 4;
                        -webkit-box-orient: vertical;
                    }

                    #journal-trade-app .has-note .day-number::after {
                        content: "🎯";
                        font-size: 12px;
                    }

                    #journal-trade-app .has-note .note-preview {
                        color: var(--journal-text-main);
                    }

                    #journal-trade-app #journalTradeImportInput {
                        display: none;
                    }

                    #journal-trade-app-modal.modal-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: var(--journal-modal-overlay);
                        z-index: 1000;
                        display: none;
                        justify-content: center;
                        align-items: center;
                        backdrop-filter: blur(5px);
                    }

                    #journal-trade-app-modal .modal-box {
                        background: var(--journal-modal-bg);
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        padding: 24px;
                        border-radius: 12px;
                        width: 90%;
                        max-width: 600px;
                        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
                        display: flex;
                        flex-direction: column;
                        height: 80vh;
                        box-sizing: border-box;
                    }

                    #journal-trade-app-modal .modal-header {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 12px;
                    }

                    #journal-trade-app-modal .modal-title {
                        font-size: 20px;
                        font-weight: bold;
                        color: #fff;
                    }

                    #journal-trade-app-modal .modal-textarea {
                        flex: 1;
                        width: 100%;
                        background: var(--journal-bg-textarea);
                        border: 1px solid var(--journal-border-color);
                        color: var(--journal-text-main);
                        padding: 16px;
                        border-radius: 6px;
                        resize: none;
                        margin-bottom: 16px;
                        font-size: 18px;
                        line-height: 1.6;
                        font-family: inherit;
                        box-sizing: border-box;
                    }

                    #journal-trade-app-modal .modal-textarea:focus {
                        outline: none;
                        border-color: var(--journal-accent-color);
                    }

                    #journal-trade-app-modal .modal-actions {
                        display: flex;
                        justify-content: flex-end;
                        gap: 8px;
                    }

                    #journal-trade-app-modal .btn {
                        font-size: 13px;
                        padding: 6px 12px;

                        color: var(--journal-text-main);
                        cursor: pointer;

                        font-family: inherit;
                    }

                    #journal-trade-app-modal .btn:hover {
                        background-color: var(--journal-bg-hover);
                    }

                    #journal-trade-app-modal .btn-danger {
                        border-color: var(--journal-danger-color);

                    }

                    }

                        background-color: #3b4d66;

                            min-height: 80px;

                            -webkit-line-clamp: 2;
                            line-clamp: 2;
                            font-size: 11px;

                    #journal-trade-app .day-index {

                        border-radius: 4px;

                    #journal-trade-app .day-badges {

                        gap: 4px;
                        margin-top: 2px;
                        margin-bottom: 4px;
                    }

                        color: #e2e8f0;

                        border-radius: 4px;

                    }

                    #journal-trade-app.privacy-active #journalTradePrivacyBtn {
                        background-color: var(--journal-bg-today);
                        border-color: var(--journal-highlight-border);
                    }

                    /* Search & Summary Modals */
                    #journal-trade-app .search-result-item {
                        background-color: var(--journal-bg-textarea);

                <div id="journal-search-modal"

                    <div class="modal-box"

                                style="font-size:14px; font-weight:bold; color:#fff; border-bottom:1px solid #334155; padding-bottom:4px; display:block; margin-bottom:12px;">心情統計</label>

                                style="font-size:14px; font-weight:bold; color:#fff; border-bottom:1px solid #334155; padding-bottom:4px; display:block; margin-bottom:12px;">熱門標籤</label>

    <div id="message-modal"
        class="modal fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none">
        <div
            class="modal-content bg-stone-800 border border-stone-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl transform scale-95">
            <h3 id="message-modal-title" class="text-lg font-semibold text-stone-100">提示</h3>
            <p id="message-modal-message" class="mt-2 text-sm text-stone-300"></p>
            <div class="mt-6 text-right">
                <button id="message-modal-close"
                    class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">確認</button>
            </div>
        </div>
    </div>



    <script>
        // DOMContentLoaded 事件確保在執行腳本前，HTML 已完全載入和解析
        document.addEventListener('DOMContentLoaded', () => {

            // --- Global Variables Needed for App & Auth ---
            let appData = { journal: {} };
            let currentUid = null;
            let dataListener = null;

            // --- DOM Elements ---
            const messageModal = document.getElementById('message-modal');
            const messageModalTitle = document.getElementById('message-modal-title');
            const messageModalMessage = document.getElementById('message-modal-message');
            const messageModalClose = document.getElementById('message-modal-close');

            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userDisplay = document.getElementById('user-display');
            const authContainer = document.getElementById('auth-container');
            const appContainer = document.getElementById('app-container');

            // --- Global Export/Import ---
            const globalExportBtn = document.getElementById('globalExportBtn');
            const globalImportBtn = document.getElementById('globalImportBtn');
            const globalImportFile = document.getElementById('globalImportFile');

            // *** Firebase 修改 ***: 獲取 Firebase 服務實例
            const auth = firebase.auth();
            const db = firebase.database();
            const provider = new firebase.auth.GoogleAuthProvider();



            /**
             * *** Firebase 修改 ***:
             * 設定 Firebase Realtime Database 的資料監聽器。
             * 當使用者登入時，此函式會被觸發，用來獲取雲端資料或初始化新使用者的資料。
             * @param {string} uid - 使用者的唯一 ID。
             */
            function setupDataListener(uid) {
                // 如果已有監聽器，先移除舊的，避免重複監聽
                if (dataListener) {
                    dataListener.off();
                }

                // 設定目前使用者的 UID
                currentUid = uid;
                // 建立指向該使用者資料庫路徑的引用
                const dbRef = db.ref('users/' + uid + '/appData');

                // *** Firebase 修改 ***: 使用 onValue 監聽資料變化 (取代 localStorage.getItem)
                // onValue 會在初次載入和資料變更時觸發
                dataListener = dbRef.on('value', (snapshot) => {
                    let storedData = null;
                    if (snapshot.exists()) {
                        // 如果雲端有資料，則使用它
                        storedData = snapshot.val();
                    }

                    // --- 初始化或載入應用程式資料 (appData) ---
                    if (storedData) {
                        appData = storedData;
                    } else {
                        appData = {
                            journal: {}
                        };
                        saveDataToFirebase();
                    }

                    // --- 確保 journal 欄位存在 ---
                    if (!appData.journal) {
                        appData.journal = {};
                    }

                    renderJournalCalendar(); // 渲染日誌日曆

                }, (error) => {
                    console.error("Firebase 資料讀取失敗:", error);
                    showModal(messageModal, '連線錯誤', '無法從 Firebase 讀取資料。');
                });
            }

            /**
             * *** Firebase 修改 ***:
             * 將 appData 物件轉換為 JSON 字串並儲存到 Firebase Realtime Database。
             * 取代 saveDataToLocalStorage()
             */
            function saveDataToFirebase() {
                // 必須要有使用者 UID 和資料庫實例才能儲存
                if (!currentUid || !db) {
                    console.warn("尚未登入或 Firebase 未初始化，無法儲存資料。");
                    return;
                }

                try {
                    const dataToSave = JSON.parse(JSON.stringify({ journal: appData.journal || {} }));

                    db.ref('users/' + currentUid + '/appData').set(dataToSave)
                        .catch((error) => {
                            // 處理可能的寫入錯誤
                            console.error("資料儲存至 Firebase 失敗:", error);
                            showModal(messageModal, '儲存失敗', '無法將資料同步至雲端。');
                        });
                } catch (error) {
                    console.error("資料儲存至 Firebase 失敗:", error);
                    showModal(messageModal, '儲存失敗', '無法將資料同步至雲端。');
                }
            }

            function showModal(modalElement, title, message) {
                if (modalElement === messageModal) {
                    messageModalTitle.textContent = title;
                    messageModalMessage.textContent = message;
                }
                modalElement.classList.remove('opacity-0', 'pointer-events-none');
                modalElement.querySelector('.modal-content').classList.remove('scale-95');
            }

            function hideModal(modalElement) {
                modalElement.classList.add('opacity-0', 'pointer-events-none');
                modalElement.querySelector('.modal-content').classList.add('scale-95');
            }

            messageModalClose.addEventListener('click', () => hideModal(messageModal));
            // *** Firebase 修改 ***: 加入認證與登入/登出邏輯

            // 監聽登入按鈕
            loginBtn.addEventListener('click', () => {
                auth.signInWithPopup(provider)
                    .catch((error) => {
                        console.error("Google 登入失敗:", error);
                        showModal(messageModal, '登入失敗', error.message);
                    });
            });

            // 監聽登出按鈕
            logoutBtn.addEventListener('click', () => {
                auth.signOut();
            });

            // 監聽認證狀態變化 (程式的主要進入點)
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // --- 使用者已登入 ---
                    console.log("使用者已登入:", user.uid);
                    // 顯示主應用程式
                    appContainer.classList.remove('hidden');
                    // 隱藏登入區塊
                    authContainer.classList.add('hidden');
                    // 顯示使用者資訊和登出按鈕
                    userDisplay.textContent = `登入為: ${user.displayName || user.email}`;
                    logoutBtn.parentElement.classList.remove('hidden');

                    // *** 觸發資料監聽器 ***
                    // 這將會從 Firebase 載入該使用者的資料並啟動應用程式
                    setupDataListener(user.uid);

                } else {
                    // --- 使用者已登出 ---
                    console.log("使用者已登出");
                    // 隱藏主應用程式
                    appContainer.classList.add('hidden');
                    // 顯示登入區塊
                    authContainer.classList.remove('hidden');
                    // 隱藏使用者資訊和登出按鈕
                    logoutBtn.parentElement.classList.add('hidden');
                    userDisplay.textContent = '';

                    // 清理狀態
                    appData = {};
                    currentUid = null;
                    if (dataListener) {
                        dataListener.off(); // 停止監聽舊使用者的資料
                        dataListener = null;
                    }
                }
            });

            // =============================================
            // === 交易日誌 (Journal Trade) 邏輯 ===
            // =============================================
            const journalEls = {
                clearMonthBtn: document.getElementById("journalTradeClearMonthBtn"),
                privacyBtn: document.getElementById("journalTradePrivacyBtn"),
                appContainer: document.getElementById("journal-trade-app"),
                exportBtn: document.getElementById("journalTradeExportBtn"),
                importInput: document.getElementById("journalTradeImportInput"),
                monthLabel: document.getElementById("journalTradeMonthLabel"),
                prevMonthBtn: document.getElementById("journalTradePrevMonthBtn"),
                nextMonthBtn: document.getElementById("journalTradeNextMonthBtn"),
                todayBtn: document.getElementById("journalTradeTodayBtn"),
                calendarGrid: document.getElementById("journalTradeCalendarGrid"),
                modal: document.getElementById("journal-trade-app-modal"),
                modalTitle: document.getElementById("journalTradeModalDateTitle"),
                deleteNoteBtn: document.getElementById("journalTradeDeleteNoteBtn"),
                textarea: document.getElementById("journalTradeNoteTextarea"),
                cancelNoteBtn: document.getElementById("journalTradeCancelNoteBtn"),
                saveNoteBtn: document.getElementById("journalTradeSaveNoteBtn"),

                // Form Fields
                moodSelect: document.getElementById("journalMoodSelect"),
                indexInput: document.getElementById("journalIndexInput"),
                tagsInput: document.getElementById("journalTagsInput"),

                // Search & Summary
                summaryBtn: document.getElementById("journalTradeSummaryBtn"),
                searchInput: document.getElementById("journalTradeSearchInput"),
                searchBtn: document.getElementById("journalTradeSearchBtn"),

                searchModal: document.getElementById("journal-search-modal"),
                searchCloseBtn: document.getElementById("journalSearchCloseBtn"),
                searchResultCount: document.getElementById("journalSearchResultCount"),
                searchResultsList: document.getElementById("journalSearchResultsList"),

                summaryModal: document.getElementById("journal-summary-modal"),
                summaryCloseBtn: document.getElementById("journalSummaryCloseBtn"),
                summaryTitle: document.getElementById("journalSummaryTitle"),
                summaryTotalDays: document.getElementById("summaryTotalDays"),
                summaryTotalIndex: document.getElementById("summaryTotalIndex"),
                summaryTopMood: document.getElementById("summaryTopMood"),
                summaryMoodCounts: document.getElementById("summaryMoodCounts"),
                summaryTopTags: document.getElementById("summaryTopTags")
            };

            const journalNow = new Date();
            const JOURNAL_TODAY_YEAR = journalNow.getFullYear();
            const JOURNAL_TODAY_MONTH = journalNow.getMonth();
            const JOURNAL_TODAY_DATE = journalNow.getDate();

            let journalViewYear = JOURNAL_TODAY_YEAR;
            let journalViewMonth = JOURNAL_TODAY_MONTH;
            let journalCurrentMonthData = {};
            let journalEditingDay = null;

            const JOURNAL_DEFAULT_TEMPLATE = `💰️`;

            // Normalizes legacy string notes to the new object format { note, mood, index, tags }
            function getNormalizedNoteData(dayData) {
                if (!dayData) return null;
                if (typeof dayData === 'string') {
                    return { note: dayData, mood: '', index: '', tags: [] };
                }
                return dayData;
            }

            // --- 日誌資料讀取/儲存 (使用 appData.journal + Firebase) ---
            function getJournalKey(year, monthIndex) {
                return `${year}-${monthIndex + 1}`;
            }

            function loadJournalMonthData(year, monthIndex) {
                const key = getJournalKey(year, monthIndex);
                if (appData.journal && appData.journal[key]) {
                    return JSON.parse(JSON.stringify(appData.journal[key])); // 深拷貝
                }
                return {};
            }

            function saveJournalCurrentMonthData() {
                if (!appData.journal) appData.journal = {};
                const key = getJournalKey(journalViewYear, journalViewMonth);
                // 如果該月沒有任何筆記，就刪除該 key，避免存空物件
                if (Object.keys(journalCurrentMonthData).length === 0) {
                    delete appData.journal[key];
                } else {
                    appData.journal[key] = JSON.parse(JSON.stringify(journalCurrentMonthData));
                }
                saveDataToFirebase();
            }

            // --- 日曆渲染 ---
            function getJournalMonthDetails(year, monthIndex) {
                const firstDay = new Date(year, monthIndex, 1).getDay();
                const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
                return { firstDay, daysInMonth };
            }

            function journalEscapeHtml(text) {
                if (!text) return "";
                return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }

            function renderJournalCalendar() {
                if (!journalEls.monthLabel) return; // 元素尚未存在
                journalEls.monthLabel.textContent = `${journalViewYear} 年 ${journalViewMonth + 1} 月`;
                journalCurrentMonthData = loadJournalMonthData(journalViewYear, journalViewMonth);
                const grid = journalEls.calendarGrid;
                grid.innerHTML = "";

                const { firstDay, daysInMonth } = getJournalMonthDetails(journalViewYear, journalViewMonth);

                // 填充前方空白
                for (let i = 0; i < firstDay; i++) {
                    const emptyCell = document.createElement("div");
                    emptyCell.className = "day-cell other-month";
                    grid.appendChild(emptyCell);
                }

                // 填充日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const cell = document.createElement("div");
                    cell.className = "day-cell";

                    const currentWeekDay = new Date(journalViewYear, journalViewMonth, day).getDay();
                    if (currentWeekDay === 0 || currentWeekDay === 6) cell.classList.add("is-weekend");

                    if (journalViewYear === JOURNAL_TODAY_YEAR && journalViewMonth === JOURNAL_TODAY_MONTH && day === JOURNAL_TODAY_DATE) {
                        cell.classList.add("is-today");
                    }

                    const noteData = getNormalizedNoteData(journalCurrentMonthData[day]);
                    if (noteData) cell.classList.add("has-note");

                    let innerHTML = `<div class="day-number">${day}</div>`;

                    if (noteData) {
                        // Render Top Info (Mood & Index)
                        let infoContent = '';
                        if (noteData.mood) {
                            infoContent += `<span class="day-mood" title="心情">${noteData.mood}</span>`;
                        }
                        if (noteData.index) {
                            infoContent += `<span class="day-index" title="已實現獲利">${noteData.index}</span>`;
                        }
                        if (infoContent) innerHTML += `<div>${infoContent}</div>`;

                        // Render Tags
                        if (noteData.tags && noteData.tags.length > 0) {
                            innerHTML += `<div class="day-badges">`;
                            noteData.tags.forEach(tag => {
                                innerHTML += `<span class="day-badge">${journalEscapeHtml(tag)}</span>`;
                            });
                            innerHTML += `</div>`;
                        }

                        // Render Note Body
                        innerHTML += `<div class="note-preview">${journalEscapeHtml(noteData.note)}</div>`;
                    }

                    innerHTML += `<div class="more-indicator" title="點擊編輯"></div>`;
                    cell.innerHTML = innerHTML;

                    cell.addEventListener("click", () => openJournalModal(day));
                    grid.appendChild(cell);
                }

                // 補齊最後一行
                const totalCells = firstDay + daysInMonth;
                const remaining = 7 - (totalCells % 7);
                if (remaining < 7) {
                    for (let i = 0; i < remaining; i++) {
                        const emptyCell = document.createElement("div");
                        emptyCell.className = "day-cell other-month";
                        grid.appendChild(emptyCell);
                    }
                }

                // 檢查是否有內容溢出
                setTimeout(() => {
                    const previews = grid.querySelectorAll(".note-preview");
                    previews.forEach(el => {
                        if (el.scrollHeight > el.clientHeight) {
                            el.parentElement.classList.add("is-overflowing");
                        }
                    });
                }, 0);
            }

            // --- Modal 邏輯 ---
            function openJournalModal(day) {
                journalEditingDay = day;
                journalEls.modalTitle.textContent = `${journalViewYear} 年 ${journalViewMonth + 1} 月 ${day} 日`;

                const noteData = getNormalizedNoteData(journalCurrentMonthData[day]);
                if (noteData) {
                    journalEls.textarea.value = noteData.note || "";
                    journalEls.moodSelect.value = noteData.mood || "";
                    journalEls.indexInput.value = noteData.index || "";
                    journalEls.tagsInput.value = (noteData.tags && noteData.tags.length > 0) ? noteData.tags.join(', ') : "";
                } else {
                    journalEls.textarea.value = JOURNAL_DEFAULT_TEMPLATE;
                    journalEls.moodSelect.value = "";
                    journalEls.indexInput.value = "";
                    journalEls.tagsInput.value = "";
                }

                journalEls.modal.style.display = "flex";
                journalEls.textarea.focus();
            }

            function closeJournalModal() {
                journalEls.modal.style.display = "none";
                journalEditingDay = null;
            }

            function saveJournalNote() {
                if (journalEditingDay === null) return;

                const note = journalEls.textarea.value.trim();
                const mood = journalEls.moodSelect.value;
                const index = journalEls.indexInput.value.trim();
                const tagsRaw = journalEls.tagsInput.value.trim();

                let tags = [];
                if (tagsRaw) {
                    tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);
                }

                if (note || mood || index || tags.length > 0) {
                    journalCurrentMonthData[journalEditingDay] = { note, mood, index, tags };
                } else {
                    delete journalCurrentMonthData[journalEditingDay];
                }

                saveJournalCurrentMonthData();
                renderJournalCalendar();
                closeJournalModal();
            }

            journalEls.cancelNoteBtn.addEventListener("click", closeJournalModal);
            journalEls.saveNoteBtn.addEventListener("click", saveJournalNote);

            journalEls.deleteNoteBtn.addEventListener("click", () => {
                if (confirm("確定要清空這天的內容嗎？")) {
                    journalEls.textarea.value = "";
                    journalEls.moodSelect.value = "";
                    journalEls.indexInput.value = "";
                    journalEls.tagsInput.value = "";
                    saveJournalNote();
                }
            });

            journalEls.modal.addEventListener("click", (e) => {
                if (e.target === journalEls.modal) saveJournalNote();
            });

            // === 搜尋功能 ===
            function performSearch() {
                const query = journalEls.searchInput.value.trim().toLowerCase();
                if (!query) return;

                let results = [];
                if (appData.journal) {
                    Object.keys(appData.journal).forEach(key => {
                        const monthData = appData.journal[key];
                        Object.keys(monthData).forEach(day => {
                            const noteData = getNormalizedNoteData(monthData[day]);
                            if (!noteData) return;

                            const searchString = `${noteData.note || ''} ${noteData.mood || ''} ${noteData.index || ''} ${(noteData.tags || []).join(' ')}`.toLowerCase();

                            if (searchString.includes(query)) {
                                const [year, month] = key.split('-');
                                results.push({
                                    year: parseInt(year),
                                    month: parseInt(month) - 1,
                                    day: parseInt(day),
                                    data: noteData
                                });
                            }
                        });
                    });
                }

                results.sort((a, b) => {
                    const dateA = new Date(a.year, a.month, a.day);
                    const dateB = new Date(b.year, b.month, b.day);
                    return dateB - dateA; // newest first
                });

                journalEls.searchResultCount.textContent = `找到 ${results.length} 筆符合「${journalEls.searchInput.value}」的紀錄`;
                journalEls.searchResultsList.innerHTML = "";

                results.forEach(res => {
                    const item = document.createElement("div");
                    item.className = "search-result-item";

                    let tagHtml = "";
                    if (res.data.tags && res.data.tags.length > 0) {
                        tagHtml = `<div class="day-badges" style="margin-top:4px;">` + res.data.tags.map(t => `<span class="day-badge" style="background:#475569;color:#e2e8f0;padding:2px 4px;border-radius:4px;font-size:10px;">${journalEscapeHtml(t)}</span>`).join('') + `</div>`;
                    }

                    item.innerHTML = `
                        <div class="search-result-date">${res.year}/${res.month + 1}/${res.day} ${res.data.mood || ''} <span style="font-size:11px;color:#38bdf8;margin-left:4px;">${res.data.index ? '指數:' + res.data.index : ''}</span></div>
                        <div class="search-result-note">${journalEscapeHtml(res.data.note)}</div>
                        ${tagHtml}
                    `;
                    item.addEventListener("click", () => {
                        journalEls.searchModal.style.display = "none";
                        journalViewYear = res.year;
                        journalViewMonth = res.month;
                        renderJournalCalendar();
                        openJournalModal(res.day);
                    });
                    journalEls.searchResultsList.appendChild(item);
                });

                journalEls.searchModal.style.display = "flex";
            }

            journalEls.searchBtn.addEventListener("click", performSearch);
            journalEls.searchInput.addEventListener("keypress", (e) => {
                if (e.key === 'Enter') performSearch();
            });
            journalEls.searchCloseBtn.addEventListener("click", () => {
                journalEls.searchModal.style.display = "none";
            });
            journalEls.searchModal.addEventListener("click", (e) => {
                if (e.target === journalEls.searchModal) journalEls.searchModal.style.display = "none";
            });

            // === 每月摘要及圖表 ===
            let summaryChartInstance = null;

            function generateMonthlySummary() {
                journalEls.summaryTitle.textContent = `${journalViewYear} 年 ${journalViewMonth + 1} 月 回顧`;

                const monthData = loadJournalMonthData(journalViewYear, journalViewMonth);
                const days = Object.keys(monthData);

                journalEls.summaryTotalDays.textContent = days.length;

                let totalIndex = 0;
                let indexCount = 0;
                let moodCounts = {};
                let tagCounts = {};

                days.forEach(day => {
                    const note = getNormalizedNoteData(monthData[day]);
                    if (!note) return;

                    if (note.index) {
                        const idxVal = parseFloat(note.index);
                        if (!isNaN(idxVal)) {
                            totalIndex += idxVal;
                            indexCount++;
                        }
                    }

                    if (note.mood) {
                        moodCounts[note.mood] = (moodCounts[note.mood] || 0) + 1;
                    }

                    if (note.tags) {
                        note.tags.forEach(tag => {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        });
                    }
                });

                if (indexCount > 0) {
                    journalEls.summaryTotalIndex.textContent = Math.round(totalIndex);
                } else {
                    journalEls.summaryTotalIndex.textContent = "-";
                }

                const sortedMoods = Object.entries(moodCounts).sort((a, b) => b[1] - a[1]);
                if (sortedMoods.length > 0) {
                    journalEls.summaryTopMood.textContent = sortedMoods[0][0];
                    journalEls.summaryMoodCounts.innerHTML = sortedMoods.map(m => `<span>${m[0]} × ${m[1]}天</span>`).join('');
                } else {
                    journalEls.summaryTopMood.textContent = "-";
                    journalEls.summaryMoodCounts.innerHTML = `<span style="color:#94a3b8; font-size:13px;">無資料</span>`;
                }

                const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
                if (sortedTags.length > 0) {
                    journalEls.summaryTopTags.innerHTML = sortedTags.map(t => `<span style="background:#475569;color:#e2e8f0;font-size:12px; padding:4px 8px;border-radius:4px;">${journalEscapeHtml(t[0])} <span style="opacity:0.7">(${t[1]})</span></span>`).join('');
                } else {
                    journalEls.summaryTopTags.innerHTML = `<span style="color:#94a3b8; font-size:13px;">無資料</span>`;
                }

                // Chart processing
                let chartLabels = [];
                let chartDataPoints = [];

                const sortedDays = days.map(Number).sort((a, b) => a - b);
                sortedDays.forEach(day => {
                    const note = getNormalizedNoteData(monthData[day]);
                    if (note && note.index) {
                        const idxVal = parseFloat(note.index);
                        if (!isNaN(idxVal)) {
                            chartLabels.push(`${journalViewMonth + 1}/${day}`);
                            chartDataPoints.push(idxVal);
                        }
                    }
                });

                const ctx = document.getElementById('summaryIndexChart').getContext('2d');
                if (summaryChartInstance) {
                    summaryChartInstance.destroy();
                }

                if (chartDataPoints.length > 0) {
                    document.getElementById('summaryIndexChart').parentElement.style.display = 'block';

                    const isPositiveTrend = chartDataPoints.length > 1 && (chartDataPoints[chartDataPoints.length - 1] >= chartDataPoints[0]);
                    const lineColor = isPositiveTrend ? '#f87171' : '#4ade80';
                    const bgColor = isPositiveTrend ? 'rgba(248, 113, 113, 0.1)' : 'rgba(74, 222, 128, 0.1)';

                    summaryChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chartLabels,
                            datasets: [{
                                label: '已實現獲利',
                                data: chartDataPoints,
                                borderColor: lineColor,
                                backgroundColor: bgColor,
                                borderWidth: 2,
                                tension: 0.3,
                                fill: true,
                                pointBackgroundColor: lineColor,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: 'rgba(30,30,30,0.9)',
                                    titleFont: { family: 'Inter', size: 13 },
                                    bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                                    padding: 10,
                                    cornerRadius: 4,
                                    displayColors: false
                                }
                            },
                            scales: {
                                y: {
                                    ticks: { color: '#94a3b8', font: { family: 'Inter' } },
                                    grid: { color: '#334155' }
                                },
                                x: {
                                    ticks: { color: '#94a3b8', font: { family: 'Inter' } },
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                } else {
                    document.getElementById('summaryIndexChart').parentElement.style.display = 'none';
                }

                journalEls.summaryModal.style.display = "flex";
            }

            journalEls.summaryBtn.addEventListener("click", generateMonthlySummary);

            journalEls.summaryCloseBtn.addEventListener("click", () => {
                journalEls.summaryModal.style.display = "none";
            });

            journalEls.summaryModal.addEventListener("click", (e) => {
                if (e.target === journalEls.summaryModal) journalEls.summaryModal.style.display = "none";
            });

            // --- 月份切換 ---
            function changeJournalMonth(offset) {
                const newDate = new Date(journalViewYear, journalViewMonth + offset, 1);
                journalViewYear = newDate.getFullYear();
                journalViewMonth = newDate.getMonth();
                renderJournalCalendar();
            }

            journalEls.prevMonthBtn.addEventListener("click", () => changeJournalMonth(-1));
            journalEls.nextMonthBtn.addEventListener("click", () => changeJournalMonth(1));
            journalEls.todayBtn.addEventListener("click", () => {
                journalViewYear = JOURNAL_TODAY_YEAR;
                journalViewMonth = JOURNAL_TODAY_MONTH;
                renderJournalCalendar();
            });

            // --- 日誌匯出 (獨立) ---
            journalEls.exportBtn.addEventListener("click", () => {
                if (!appData.journal || Object.keys(appData.journal).length === 0) {
                    showModal(messageModal, '提示', '目前沒有任何日誌資料可匯出。');
                    return;
                }
                const blob = new Blob([JSON.stringify(appData.journal, null, 2)], { type: "application/json" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `journal_trade_backup_${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
                showModal(messageModal, '匯出成功', '日誌資料已成功匯出為 JSON 檔案。');
            });

            // --- 日誌匯入 (獨立) ---
            journalEls.importInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (typeof imported !== 'object' || imported === null) {
                            throw new Error('格式錯誤');
                        }
                        if (confirm("匯入將會合併/覆蓋相同月份的現有日誌資料，確定要繼續嗎？")) {
                            if (!appData.journal) appData.journal = {};

                            // 兼容舊版 full_backup (包含 accounts 和 journal)
                            const journalDataToImport = imported.journal ? imported.journal : imported;

                            // 排除非日誌格式的 key (例如 'accounts', 'currentAccount' 等如果誤判)
                            Object.keys(journalDataToImport).forEach(k => {
                                // 日誌 key 格式為 "YYYY-M" 或 "YYYY-MM"
                                if (/^\d{4}-\d{1,2}$/.test(k)) {
                                    appData.journal[k] = journalDataToImport[k];
                                }
                            });

                            saveDataToFirebase();
                            renderJournalCalendar();
                            showModal(messageModal, '匯入成功', '日誌資料已成功匯入並同步至雲端。');
                        }
                    } catch (err) {
                        showModal(messageModal, '匯入失敗', `檔案格式錯誤。(${err.message})`);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });

            // --- 清除本月 ---
            journalEls.clearMonthBtn.addEventListener("click", () => {
                if (confirm(`⚠️ 警告：\n確定要清除【${journalViewYear} 年 ${journalViewMonth + 1} 月】的所有日誌嗎？`)) {
                    journalCurrentMonthData = {};
                    saveJournalCurrentMonthData();
                    renderJournalCalendar();
                    showModal(messageModal, '已清除', `${journalViewYear} 年 ${journalViewMonth + 1} 月的日誌已清除。`);
                }
            });

            // --- 隱私模式 ---
            let journalIsPrivacyMode = false;
            journalEls.privacyBtn.addEventListener("click", () => {
                journalIsPrivacyMode = !journalIsPrivacyMode;
                if (journalIsPrivacyMode) {
                    journalEls.appContainer.classList.add("privacy-active");
                    journalEls.privacyBtn.textContent = "🕶️ 內容已隱藏";
                } else {
                    journalEls.appContainer.classList.remove("privacy-active");
                    journalEls.privacyBtn.textContent = "👓️ 顯示/隱藏";
                }
            });

        });
    </script>
</body>

</html>
